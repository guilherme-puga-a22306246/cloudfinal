name: Deploy to AWS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infrastructure/terraform
        run: terraform init

      - name: Terraform validate
        working-directory: infrastructure/terraform
        run: terraform validate

      - name: Terraform plan
        working-directory: infrastructure/terraform
        run: terraform plan -out=tfplan

      - name: Terraform apply
        working-directory: infrastructure/terraform
        run: terraform apply -auto-approve tfplan

      - name: Debug Terraform outputs
        working-directory: infrastructure/terraform
        run: |
          terraform output
          echo "primary ip:"
          terraform output -raw primary_instance_public_ip || true
          echo "standby ip:"
          terraform output -raw standby_instance_public_ip || true

      - name: Export Terraform outputs
        working-directory: infrastructure/terraform
        run: |
          PRIMARY_EC2_PUBLIC_IP=$(terraform output -raw primary_instance_public_ip)
          STANDBY_EC2_PUBLIC_IP=$(terraform output -raw standby_instance_public_ip)
          PRIMARY_SQS_QUEUE_URL=$(terraform output -raw primary_product_events_queue_url)
          STANDBY_SQS_QUEUE_URL=$(terraform output -raw standby_product_events_queue_url)

          echo "PRIMARY_EC2_PUBLIC_IP=$PRIMARY_EC2_PUBLIC_IP" >> $GITHUB_ENV
          echo "STANDBY_EC2_PUBLIC_IP=$STANDBY_EC2_PUBLIC_IP" >> $GITHUB_ENV
          echo "PRIMARY_SQS_QUEUE_URL=$PRIMARY_SQS_QUEUE_URL" >> $GITHUB_ENV
          echo "STANDBY_SQS_QUEUE_URL=$STANDBY_SQS_QUEUE_URL" >> $GITHUB_ENV

      - name: Install Ansible
        run: |
          python3 -m pip install --user "ansible-core==2.15.13"
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          ansible --version

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/cloud-final-key.pem
          chmod 400 ~/.ssh/cloud-final-key.pem

      - name: Read database credentials and DR state
        run: |
          DB_USERNAME=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/db/username" \
            --query "Parameter.Value" \
            --output text)

          DB_PASSWORD=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/db/password" \
            --with-decryption \
            --query "Parameter.Value" \
            --output text)

          ACTIVE_REGION=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/dr/active-region" \
            --query "Parameter.Value" \
            --output text)

          PRIMARY_DB_ENDPOINT=$(aws rds describe-db-instances \
            --region eu-central-1 \
            --db-instance-identifier cloud-final-dev-database \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          STANDBY_DB_ENDPOINT=$(aws rds describe-db-instances \
            --region eu-west-1 \
            --db-instance-identifier cloud-final-dev-standby-database \
            --query "DBInstances[0].Endpoint.Address" \
            --output text)

          echo "DB_USERNAME=$DB_USERNAME" >> "$GITHUB_ENV"
          echo "DB_PASSWORD=$DB_PASSWORD" >> "$GITHUB_ENV"
          echo "ACTIVE_REGION=$ACTIVE_REGION" >> "$GITHUB_ENV"
          echo "PRIMARY_DB_ENDPOINT=$PRIMARY_DB_ENDPOINT" >> "$GITHUB_ENV"
          echo "STANDBY_DB_ENDPOINT=$STANDBY_DB_ENDPOINT" >> "$GITHUB_ENV"

          echo "::add-mask::$DB_PASSWORD"    

      - name: Generate Ansible inventory
        run: |
          cat > ansible/inventory.ini <<EOT
          [primary]
          primary1 ansible_host=${PRIMARY_EC2_PUBLIC_IP} ansible_user=ec2-user sqs_queue_url=${PRIMARY_SQS_QUEUE_URL} db_endpoint=${PRIMARY_DB_ENDPOINT} db_username=${DB_USERNAME} db_password='${DB_PASSWORD}' use_rds=true

          [standby]
          standby1 ansible_host=${STANDBY_EC2_PUBLIC_IP} ansible_user=ec2-user sqs_queue_url=${STANDBY_SQS_QUEUE_URL} db_endpoint=${STANDBY_DB_ENDPOINT} db_username=${DB_USERNAME} db_password='${DB_PASSWORD}' use_rds=false

          [web_servers:children]
          primary
          standby

          [all:vars]
          ansible_ssh_private_key_file=~/.ssh/cloud-final-key.pem
          ansible_python_interpreter=/usr/bin/python3
          ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
          EOT

      - name: Prepare EC2 for Ansible
        run: |
          for ip in "$PRIMARY_EC2_PUBLIC_IP" "$STANDBY_EC2_PUBLIC_IP"; do
            ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null \
              -i ~/.ssh/cloud-final-key.pem \
              ec2-user@$ip \
              "sudo yum install -y python3"
          done

      - name: Test Ansible connection
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible all -i ansible/inventory.ini -m ping

      - name: Deploy services with Ansible
        run: |
          ANSIBLE_HOST_KEY_CHECKING=False ansible-playbook \
            -i ansible/inventory.ini \
            ansible/playbooks/deploy-services.yml
