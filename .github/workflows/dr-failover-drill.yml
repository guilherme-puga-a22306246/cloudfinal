name: DR Failover Drill

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: 'Write DRILL to confirm the simulated outage'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  failover-drill:
    if: ${{ inputs.confirmation == 'DRILL' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}
          aws-region: eu-central-1

      - name: Read DR state from Parameter Store
        run: |
          ACTIVE_REGION=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/dr/active-region" \
            --query "Parameter.Value" \
            --output text)

          PASSIVE_REGION=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/dr/passive-region" \
            --query "Parameter.Value" \
            --output text)

          DR_STATUS=$(aws ssm get-parameter \
            --region eu-central-1 \
            --name "/cloud-final/dr/status" \
            --query "Parameter.Value" \
            --output text)

          echo "ACTIVE_REGION=$ACTIVE_REGION" >> $GITHUB_ENV
          echo "PASSIVE_REGION=$PASSIVE_REGION" >> $GITHUB_ENV
          echo "DR_STATUS=$DR_STATUS" >> $GITHUB_ENV

          echo "Active region: $ACTIVE_REGION"
          echo "Passive region: $PASSIVE_REGION"
          echo "Status: $DR_STATUS"

      - name: Resolve DR resources
        run: |
          if [ "$DR_STATUS" != "healthy" ]; then
            echo "DR state must be healthy before starting a drill. Current status: $DR_STATUS"
            exit 1
          fi

          if [ "$ACTIVE_REGION" = "eu-central-1" ]; then
            ACTIVE_INSTANCE_NAME="cloud-final-dev-default-instance"
            ACTIVE_ALB_NAME="cloud-final-dev-alb"
            PASSIVE_ALB_NAME="cloud-final-dev-standby-alb"
          elif [ "$ACTIVE_REGION" = "eu-west-1" ]; then
            ACTIVE_INSTANCE_NAME="cloud-final-dev-standby-default-instance"
            ACTIVE_ALB_NAME="cloud-final-dev-standby-alb"
            PASSIVE_ALB_NAME="cloud-final-dev-alb"
          else
            echo "Unsupported active region: $ACTIVE_REGION"
            exit 1
          fi

          ACTIVE_INSTANCE_ID=$(aws ec2 describe-instances \
            --region "$ACTIVE_REGION" \
            --filters \
              "Name=tag:Name,Values=$ACTIVE_INSTANCE_NAME" \
              "Name=instance-state-name,Values=pending,running,stopping,stopped" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text)

          ACTIVE_ALB_DNS=$(aws elbv2 describe-load-balancers \
            --region "$ACTIVE_REGION" \
            --names "$ACTIVE_ALB_NAME" \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          PASSIVE_ALB_DNS=$(aws elbv2 describe-load-balancers \
            --region "$PASSIVE_REGION" \
            --names "$PASSIVE_ALB_NAME" \
            --query "LoadBalancers[0].DNSName" \
            --output text)

          if [ -z "$ACTIVE_INSTANCE_ID" ] || [ "$ACTIVE_INSTANCE_ID" = "None" ]; then
            echo "Could not find the active EC2 instance."
            exit 1
          fi

          echo "ACTIVE_INSTANCE_ID=$ACTIVE_INSTANCE_ID" >> "$GITHUB_ENV"
          echo "PUBLIC_ENDPOINT=http://cloud.guilhermepuga.pt/actuator/health" >> "$GITHUB_ENV"
          echo "ACTIVE_ALB_ENDPOINT=http://$ACTIVE_ALB_DNS/actuator/health" >> "$GITHUB_ENV"
          echo "PASSIVE_ALB_ENDPOINT=http://$PASSIVE_ALB_DNS/actuator/health" >> "$GITHUB_ENV"

          echo "Active region: $ACTIVE_REGION"
          echo "Passive region: $PASSIVE_REGION"
          echo "Active instance: $ACTIVE_INSTANCE_ID"

      - name: Confirm initial health
        run: |
          curl --fail --silent --show-error "$PUBLIC_ENDPOINT"
          echo
          curl --fail --silent --show-error "$ACTIVE_ALB_ENDPOINT"
          echo
          curl --fail --silent --show-error "$PASSIVE_ALB_ENDPOINT"
          echo

      - name: Record drill start
        run: |
          START_EPOCH=$(date +%s)
          echo "START_EPOCH=$START_EPOCH" >> "$GITHUB_ENV"
          echo "Drill started at $(date -u --iso-8601=seconds)" | tee dr-results.txt

      - name: Stop active EC2
        run: |
          aws ec2 stop-instances \
            --region "$ACTIVE_REGION" \
            --instance-ids "$ACTIVE_INSTANCE_ID"

          aws ec2 wait instance-stopped \
            --region "$ACTIVE_REGION" \
            --instance-ids "$ACTIVE_INSTANCE_ID"

      - name: Wait for DNS failover and measure RTO
        run: |
          DEADLINE=$((START_EPOCH + 600))
          SUCCESS=false

          while [ "$(date +%s)" -lt "$DEADLINE" ]; do
            NOW=$(date -u --iso-8601=seconds)

            if curl --fail --silent --max-time 10 "$PUBLIC_ENDPOINT" > response.json; then
              END_EPOCH=$(date +%s)
              RTO=$((END_EPOCH - START_EPOCH))

              echo "Service recovered through Route 53 at $NOW" | tee -a dr-results.txt
              echo "Measured RTO: ${RTO} seconds" | tee -a dr-results.txt
              cat response.json | tee -a dr-results.txt
              SUCCESS=true
              break
            fi

            echo "Waiting for failover at $NOW..." | tee -a dr-results.txt
            sleep 10
          done

          if [ "$SUCCESS" != "true" ]; then
            echo "Failover was not completed within 600 seconds." | tee -a dr-results.txt
            exit 1
          fi

      - name: Confirm active environment is unavailable and passive is healthy
        run: |
          echo "Active ALB response:" | tee -a dr-results.txt
          curl --silent --show-error --max-time 10 "$ACTIVE_ALB_ENDPOINT" \
            | tee -a dr-results.txt || true

          echo | tee -a dr-results.txt
          echo "Passive ALB response:" | tee -a dr-results.txt
          curl --fail --silent --show-error --max-time 10 "$PASSIVE_ALB_ENDPOINT" \
            | tee -a dr-results.txt

      - name: Restore active EC2
        if: always()
        run: |
          aws ec2 start-instances \
            --region "$ACTIVE_REGION" \
            --instance-ids "$ACTIVE_INSTANCE_ID"

          aws ec2 wait instance-running \
            --region "$ACTIVE_REGION" \
            --instance-ids "$ACTIVE_INSTANCE_ID"

      - name: Wait for active environment recovery
        if: always()
        run: |
          for attempt in $(seq 1 60); do
            if curl --fail --silent --max-time 10 "$ACTIVE_ALB_ENDPOINT" > /dev/null; then
              echo "Active ALB recovered." | tee -a dr-results.txt
              exit 0
            fi

            echo "Waiting for active recovery: attempt $attempt/60" \
              | tee -a dr-results.txt
            sleep 10
          done

          echo "Active environment did not recover within the expected period." \
            | tee -a dr-results.txt
          exit 1

      - name: Upload drill evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dr-failover-results
          path: |
            dr-results.txt
            response.json
          if-no-files-found: warn